name: 'Pixelated Empathy Security Analysis'

# Keep default queries enabled
disable-default-queries: false

# Define query filters to focus on security and quality
query-filters:
  - include:
      kind:
        - problem
        - path-problem
  - exclude:
      tags contain: experimental

# Specify which paths to analyze
paths:
  - src
  - ai
  - scripts

# Exclude generated code, dependencies, and test files
paths-ignore:
  - '**/node_modules'
  - '**/dist'
  - '**/build'
  - '**/.next'
  - '**/.astro'
  - '**/test'
  - '**/tests'
  - '**/__tests__'
  - '**/spec'
  - '**/mocks'
  - '**/__mocks__'
  - '**/*.test.*'
  - '**/*.spec.*'
  - '**/coverage'
  - '**/.venv'
  - '**/venv'
  - '**/site-packages'
  - '**/__pycache__'
  - '**/*.pyc'
  - '**/playwright-report'
  - '**/test-results'

# Include custom queries for HIPAA/FHIR/EHR security
queries:
  - name: EHR - Unencrypted Data Transfer
    uses: ./.github/codeql/custom-queries/ehr/unencrypted-ehr-data.ql
  - name: EHR - Insecure Authentication
    uses: ./.github/codeql/custom-queries/ehr/insecure-ehr-auth.ql
  - name: EHR - Missing Audit Logging
    uses: ./.github/codeql/custom-queries/ehr/missing-audit-log.ql
  - name: EHR - Security Patterns
    uses: ./.github/codeql/custom-queries/ehr/ehr-security-patterns.ql
  - name: FHIR - Unvalidated Resource Access
    uses: ./.github/codeql/custom-queries/fhir/unvalidated-fhir-access.ql
  - name: FHIR - Insecure Operations
    uses: ./.github/codeql/custom-queries/fhir/insecure-fhir-ops.ql
  - name: FHIR - Missing Version Check
    uses: ./.github/codeql/custom-queries/fhir/missing-fhir-version.ql
  - name: FHIR - Insecure Search
    uses: ./.github/codeql/custom-queries/fhir/insecure-fhir-search.ql
  # Use additional query packs for comprehensive security analysis
  - uses: security-extended
  - uses: security-and-quality
