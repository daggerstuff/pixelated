name: 'Pixelated Empathy Security Analysis'

# Keep default queries enabled
disable-default-queries: false

# Define query filters to focus on security and quality
query-filters:
  - include:
      kind:
        - problem
        - path-problem
  - exclude:
      tags contain: experimental

# Specify which paths to analyze
paths:
  - src
  - ai
  - scripts

# Exclude generated code, dependencies, and test files
paths-ignore:
  - '**/node_modules'
  - '**/dist'
  - '**/build'
  - '**/.next'
  - '**/.astro'
  - '**/test'
  - '**/tests'
  - '**/__tests__'
  - '**/spec'
  - '**/mocks'
  - '**/__mocks__'
  - '**/*.test.*'
  - '**/*.spec.*'
  - '**/coverage'
  - '**/.venv'
  - '**/venv'
  - '**/site-packages'
  - '**/__pycache__'
  - '**/*.pyc'
  - '**/playwright-report'
  - '**/test-results'

# Include custom queries for HIPAA/FHIR/EHR security
queries:
  - name: FHIR Security Checks
    uses: ./.github/codeql/custom-queries/fhir-unvalidated-access.ql
  - uses: ./.github/codeql/custom-queries/fhir-insecure-ops.ql
  - # TODO: #1235 - Fix FHIR missing version check logic (disabled until fixed)
  - # uses: ./.github/codeql/custom-queries/fhir-missing-version-check.ql
  - # TODO: #1234 - Fix FHIR insecure search logic (disabled until fixed)
  - # uses: ./.github/codeql/custom-queries/fhir-insecure-search.ql
  - name: EHR Security Checks
    # TODO: #1236 - Fix EHR unencrypted data transfer logic (disabled until fixed)
    # uses: ./.github/codeql/custom-queries/ehr-unencrypted-data-transfer.ql
  - uses: ./.github/codeql/custom-queries/ehr-missing-audit-log.ql
  - # TODO: #1238 - Fix EHR insecure auth logic (disabled until fixed)
  - # uses: ./.github/codeql/custom-queries/ehr-insecure-auth.ql
  - # TODO: #1239 - Fix EHR security pattern logic (disabled until fixed)
  - # uses: ./.github/codeql/custom-queries/ehr-security-pattern.ql
  # Use additional query packs for comprehensive security analysis
  - uses: security-extended
  - uses: security-and-quality

# Verification: Local dry-run of the CodeQL workflow confirms that the above
# disabled queries are not executed, ensuring no faulty results will run in CI.