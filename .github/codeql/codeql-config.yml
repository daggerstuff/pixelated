name: 'Pixelated Empathy Security Analysis'

# Keep default queries enabled
disable-default-queries: false

# Define query filters to focus on security and quality
query-filters:
  - include:
      kind:
        - problem
        - path-problem
  - exclude:
      tags contain: experimental

# Specify which paths to analyze
paths:
  - src
  - ai
  - scripts

# Exclude generated code, dependencies, and test files
paths-ignore:
  - '**/node_modules'
  - '**/dist'
  - '**/build'
  - '**/.next'
  - '**/.astro'
  - '**/test'
  - '**/tests'
  - '**/__tests__'
  - '**/spec'
  - '**/mocks'
  - '**/__mocks__'
  - '**/*.test.*'
  - '**/*.spec.*'
  - '**/coverage'
  - '**/.venv'
  - '**/venv'
  - '**/site-packages'
  - '**/__pycache__'
  - '**/*.pyc'
  - '**/playwright-report'
  - '**/test-results'

# Custom queries are loaded in the workflow to avoid initialization conflicts
