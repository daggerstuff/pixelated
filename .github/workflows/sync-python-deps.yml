name: Sync Python Dependencies

on:
  push:
    branches: [ staging ]
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    branches: [ staging ]
    paths:
      - 'pyproject.toml'
      - 'requirements.txt'

jobs:
  sync-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Check if pyproject.toml changed
        id: pyproject_changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^pyproject.toml$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Check if requirements.txt changed
        id: requirements_changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^requirements.txt$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Sync pyproject.toml -> requirements.txt
        if: steps.pyproject_changed.outputs.changed == 'true'
        run: |
          echo "pyproject.toml changed, regenerating requirements.txt"
          uv pip compile pyproject.toml -o requirements.txt
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git diff --cached --quiet || git commit -m "chore(deps): update requirements.txt from pyproject.toml [skip ci]"
          git push
          
      - name: Sync requirements.txt -> pyproject.toml
        if: steps.requirements_changed.outputs.changed == 'true'
        run: |
          echo "requirements.txt changed, updating pyproject.toml"
          # Create a temporary requirements.in with just the direct dependencies
          grep -v "^#" requirements.txt | grep -v "^\\s*$" | cut -d'=' -f1 > requirements.in
          
          # Use pip-compile to generate a new requirements.txt from pyproject.toml
          # Then extract just the direct dependencies to update pyproject.toml
          uv pip compile requirements.in -o requirements-temp.txt --no-header
          
          # Extract package names and versions from the compiled requirements
          python3 -c "
          import re
          import toml
          
          # Read current pyproject.toml
          with open('pyproject.toml', 'r') as f:
              data = toml.load(f)
          
          # Read compiled requirements
          deps = {}
          with open('requirements-temp.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      # Parse package==version
                      match = re.match(r'^([a-zA-Z0-9][a-zA-Z0-9._-]*)([=<>!~]+.*)$', line)
                      if match:
                          pkg, version = match.groups()
                          deps[pkg] = version
          
          # Update dependencies in pyproject.toml
          if 'project' in data and 'dependencies' in data['project']:
              new_deps = []
              for dep in data['project']['dependencies']:
                  # Extract package name from existing dependency
                  pkg_match = re.match(r'^([a-zA-Z0-9][a-zA-Z0-9._-]*)', dep)
                  if pkg_match:
                      pkg = pkg_match.group(1)
                      if pkg in deps:
                          new_deps.append(f'{pkg}{deps[pkg]}')
                      else:
                          new_deps.append(dep)
                  else:
                      new_deps.append(dep)
              data['project']['dependencies'] = new_deps
          
          # Write back to pyproject.toml
          with open('pyproject.toml', 'w') as f:
              toml.dump(data, f)
          "
          
          # Clean up temp files
          rm -f requirements.in requirements-temp.txt
          
          # Commit changes
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore(deps): update pyproject.toml from requirements.txt [skip ci]"
          git push
