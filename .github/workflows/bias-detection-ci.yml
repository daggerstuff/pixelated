name: Bias Detection Engine CI/CD

permissions:
  contents: read
  id-token: write
  actions: read
  checks: read
  pull-requests: read
  security-events: write

on:
  push:
    branches: [main, master, staging]
    paths:
      - src/lib/ai/bias-detection/**
      - src/components/admin/bias-detection/**
      - src/pages/api/bias-detection/**
      - tests/**/*bias-detection*
      - .github/workflows/bias-detection-ci.yml
  pull_request:
    branches: [main, master, staging]
    paths:
      - src/lib/ai/bias-detection/**
      - src/components/admin/bias-detection/**
      - src/pages/api/bias-detection/**
      - tests/**/*bias-detection*
      - .github/workflows/bias-detection-ci.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHA_LOCAL_RUN: 'false'
  TRACE_TRIVY_DEPRECATION: ${{ vars.TRACE_TRIVY_DEPRECATION || 'false' }}
  NODE_VERSION: 24.14.0
  PYTHON_VERSION: 3.13
  PNPM_VERSION: 10.33.2

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Run Trivy vulnerability scanner
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          NODE_OPTIONS: ${{ env.TRACE_TRIVY_DEPRECATION == 'true' && '--trace-deprecation' || '--no-deprecation' }}
        with:
          cache: 'false'
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Initialize CodeQL
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        uses: github/codeql-action/init@v4
        with:
          languages: javascript,typescript

      - name: Setup Node.js for CodeQL
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack for CodeQL
        run: corepack enable

      - name: Setup pnpm for CodeQL
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory for CodeQL
        id: pnpm-cache-codeql
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache for CodeQL
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ steps.pnpm-cache-codeql.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential
          pnpm add -g node-gyp

      - name: Install dependencies for CodeQL
        run: pnpm install --no-frozen-lockfile

      - name: Build for CodeQL
        run: pnpm build

      - name: Perform CodeQL Analysis
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        uses: github/codeql-action/analyze@v4

  # Code quality and linting
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential
          pnpm add -g node-gyp

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run oxlint type-aware
        run: pnpm exec oxlint --type-aware -c .oxlintrc.json .

      - name: Check formatting
        run: pnpm format:check

  typescript-tests:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    if:
      ${{ needs.security-scan.result == 'success' && needs.code-quality.result
      == 'success' }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout
          5s --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential
          pnpm add -g node-gyp

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup test environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env.test
          else
            touch .env.test
          fi
          echo "DATABASE_URL=postgresql://${POSTGRES_USER}@localhost:5432/test_db" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
        env:
          POSTGRES_USER: postgres

      - name: Run unit tests
        run: pnpm test:unit
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: pnpm test:integration
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ./coverage/lcov.info
          flags: typescript
          name: typescript-coverage

  python-tests:
    name: Python ML Tests
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ensure `uv` shim is available
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            echo "uv not found - installing via pip"
            python -m pip install --upgrade pip
            python -m pip install uv
          else
            echo "uv already installed"
          fi

      - name: Prepare uv venv
        id: prepare-uv
        uses: ./.github/actions/prepare-uv-venv
        with:
          service-dir: src/lib/ai/bias-detection/python-service

      - name: Sync CI constraints from pinned requirements
        run: |
          cd src/lib/ai/bias-detection/python-service
          python - <<'PY'
          import re
          from pathlib import Path

          req_text = Path("requirements.txt").read_text().splitlines()
          wanted = {}
          for line in req_text:
              m = re.match(r"^([A-Za-z0-9_.-]+)==([^\s#]+)", line.strip())
              if not m:
                  continue
              name = m.group(1).lower().replace("_", "-")
              if name in {"numpy", "pandas"}:
                  wanted[name] = line.strip()

          missing = sorted({"numpy", "pandas"} - wanted.keys())
          if missing:
              raise SystemExit(
                  "Missing pinned versions in requirements.txt: " + ", ".join(missing)
              )

          Path("constraints-ci.txt").write_text(
              "# Auto-synced CI constraints from requirements.txt\n"
              "# Generated during CI; keep requirements.txt as the source of truth.\n"
              f"{wanted['numpy']}\n{wanted['pandas']}\n"
          )
          print("Wrote constraints-ci.txt:", wanted["numpy"], wanted["pandas"])
          PY

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pip
          key:
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{
            hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Install Python dependencies
        run: |
          if [ ! -d "src/lib/ai/bias-detection/python-service" ]; then
            echo "Error: Python service directory not found"
            ls -la src/lib/ai/bias-detection/
            exit 1
          fi

          # Prepare uv venv using the composite action, then use its output
          # NOTE: composite actions run as steps, so this shell block only performs installs after the action has run.
          cd src/lib/ai/bias-detection/python-service

          # Use the use-system output if set
          USE_SYSTEM="${{ steps.prepare-uv.outputs.use-system }}"

          uv pip install ${USE_SYSTEM} --upgrade pip setuptools wheel
          # Constrain numpy/pandas to compatible binaries to avoid ABI mismatch
          uv pip install ${USE_SYSTEM} --only-binary=:all: -c constraints-ci.txt numpy pandas
          uv pip install ${USE_SYSTEM} -r requirements.txt -c constraints-ci.txt
          uv pip install ${USE_SYSTEM} pytest pytest-cov pytest-asyncio httpx

      - name: Run Python linting
        run: |
          cd src/lib/ai/bias-detection/python-service
          uv pip install flake8 black isort
          # Check formatting with black (use uv black directly)
          uv black --check --diff .
          # Check import sorting
          uv isort --check-only --diff .
          # Run flake8 for code quality
          uv flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Python tests
        run: |
          cd src/lib/ai/bias-detection/python-service
          uv python -m pytest test_bias_detection_service.py -v --cov=bias_detection_service --cov-report=xml --cov-fail-under=25
        env:
          ENV: ci
          FLASK_SECRET_KEY: test-flask-secret
          JWT_SECRET_KEY: test-jwt-secret

      - name: Upload Python coverage
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ./src/lib/ai/bias-detection/python-service/coverage.xml
          flags: python
          name: python-coverage

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typescript-tests, python-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential
          pnpm add -g node-gyp

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Python for ML service
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ensure `uv` shim is available
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            echo "uv not found - installing via pip"
            python -m pip install --upgrade pip
            python -m pip install uv
          else
            echo "uv already installed"
          fi

      - name: Prepare uv venv
        id: prepare-uv
        uses: ./.github/actions/prepare-uv-venv
        with:
          service-dir: src/lib/ai/bias-detection/python-service

      - name: Sync CI constraints from pinned requirements
        run: |
          cd src/lib/ai/bias-detection/python-service
          python - <<'PY'
          import re
          from pathlib import Path

          req_text = Path("requirements.txt").read_text().splitlines()
          wanted = {}
          for line in req_text:
              m = re.match(r"^([A-Za-z0-9_.-]+)==([^\s#]+)", line.strip())
              if not m:
                  continue
              name = m.group(1).lower().replace("_", "-")
              if name in {"numpy", "pandas"}:
                  wanted[name] = line.strip()

          missing = sorted({"numpy", "pandas"} - wanted.keys())
          if missing:
              raise SystemExit(
                  "Missing pinned versions in requirements.txt: " + ", ".join(missing)
              )

          Path("constraints-ci.txt").write_text(
              "# Auto-synced CI constraints from requirements.txt\n"
              "# Generated during CI; keep requirements.txt as the source of truth.\n"
              f"{wanted['numpy']}\n{wanted['pandas']}\n"
          )
          print("Wrote constraints-ci.txt:", wanted["numpy"], wanted["pandas"])
          PY

      - name: Install Python ML dependencies
        run: |
          cd src/lib/ai/bias-detection/python-service

          USE_SYSTEM="${{ steps.prepare-uv.outputs.use-system }}"

          uv pip install ${USE_SYSTEM} --upgrade pip setuptools wheel
          # Constrain numpy/pandas to compatible binaries to avoid ABI mismatch
          uv pip install ${USE_SYSTEM} --only-binary=:all: -c constraints-ci.txt numpy pandas
          uv pip install ${USE_SYSTEM} -r requirements.txt -c constraints-ci.txt

      - name: Setup test database
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env.test
          else
            touch .env.test
          fi
          echo "DATABASE_URL=postgresql://${POSTGRES_USER}@localhost:5432/test_db" >> .env.test
        env:
          POSTGRES_USER: postgres

      - name: Ensure Playwright report directory exists
        run: mkdir -p playwright-report-browser-compat

      - name: Install Playwright browsers
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        run: pnpm exec playwright install --with-deps

      - name: Start Python ML service
        run: |
          cd src/lib/ai/bias-detection/python-service
          uv python bias_detection_service.py &
          PYTHON_PID=$!
          echo "Started Python service with PID: $PYTHON_PID"
          echo "Waiting for Python service to be ready..."
          MAX_RETRIES=20
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -sSf http://localhost:5000/health > /dev/null 2>&1; then
              echo "Python service is ready!"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES - service not ready yet..."
            sleep 1
          done
          # Check if the service is still running
          if kill -0 $PYTHON_PID 2>/dev/null; then
            echo "Python service is running but health check failed"
          else
            echo "Python service failed to start"
          fi
          exit 1
        env:
          FLASK_ENV: testing
          ENV: ci
          FLASK_SECRET_KEY: test-flask-secret
          JWT_SECRET_KEY: test-jwt-secret

      - name: Build application
        run: pnpm build

      - name: Start application
        run: |
          pnpm start &
          echo "Waiting for application to be ready..."
          MAX_RETRIES=60
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -sSf http://localhost:4321/health > /dev/null 2>&1; then
              echo "Application is ready!"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES - application not ready yet..."
            sleep 1
          done
          echo "Application failed to become ready after ${MAX_RETRIES} seconds"
          exit 1
        env:
          NODE_ENV: test

      - name: Run Playwright tests
        run: pnpm test:e2e --project=chromium
        env:
          NODE_ENV: test

      - name: Upload E2E test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
