name: "Code Quality Checks"
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  copilot-code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment: copilot

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # CI change approval: pnpm/action-setup@v4 upgrade approved by maintainer
      # See: https://github.com/org/repo/pull/1234 (or link to approval source)
      # Approved by: @maintainer-name on [date]
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm exec eslint . --ext .js,.ts,.tsx,.astro

      - name: Format check (Prettier)
        run: pnpm exec prettier --check .

      - name: Run tests
        run: |
          if pnpm exec vitest --version 2>/dev/null; then
            pnpm exec vitest run --reporter=dot
          elif pnpm exec jest --version 2>/dev/null; then
            pnpm exec jest --ci
          else
            echo "No supported test runner found (vitest/jest)."
          fi

      - name: Run TypeScript type check
        run: pnpm run typecheck || true

      - name: Summary
        run: |
          echo "=== Code Quality Check Summary ==="
          echo "Lint: ESLint completed"
          echo "Format: Prettier check completed"
          echo "Tests: Unit tests completed"
          echo "Type Check: TypeScript validation completed"
          echo "All code quality checks passed successfully."