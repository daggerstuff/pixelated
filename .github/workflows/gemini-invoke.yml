name: '▶️ Gemini Invoke'
on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false
      app_id:
        type: 'string'
        description: 'GitHub App ID used for token minting'
        required: false
      gcp_location:
        type: 'string'
        description: 'Google Cloud location for Gemini CLI'
        required: false
      gcp_project_id:
        type: 'string'
        description: 'Google Cloud project ID'
        required: false
      gcp_service_account:
        type: 'string'
        description: 'Google Cloud service account email'
        required: false
      gcp_workload_identity_provider:
        type: 'string'
        description: 'Google Cloud Workload Identity Provider resource'
        required: false
      gemini_cli_version:
        type: 'string'
        description: 'Gemini CLI version'
        required: false
      gemini_debug:
        type: 'string'
        description: 'Whether to enable Gemini CLI debug logging'
        required: false
      gemini_model:
        type: 'string'
        description: 'Gemini model identifier'
        required: false
      google_genai_use_gca:
        type: 'string'
        description: 'Enable Gemini Code Assist'
        required: false
      google_genai_use_vertexai:
        type: 'string'
        description: 'Enable Vertex AI'
        required: false
      upload_artifacts:
        type: 'string'
        description: 'Whether to upload invocation artifacts'
        required: false
concurrency:
  group:
    '${{ github.workflow }}-invoke-${{ github.event_name }}-${{
    github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: false
defaults:
  run:
    shell: 'bash'
jobs:
  invoke:
    runs-on: 'ubuntu-latest'
    env:
      WORKFLOW_VARS_JSON: ${{ toJSON(vars) }}
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ inputs.app_id != '' || fromJSON(env.WORKFLOW_VARS_JSON)['APP_ID'] != '' }}
        uses: 'actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859'
        # ratchet:actions/create-github-app-token@v3
        with:
          app-id:
            ${{ inputs.app_id || fromJSON(env.WORKFLOW_VARS_JSON)['APP_ID'] }}
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'
      - name: 'Checkout Code'
        uses: 'actions/checkout@v6'
        # ratchet:exclude
      - name: 'Run Gemini CLI'
        id: 'run_gemini'
        uses: 'google-github-actions/run-gemini-cli@v0'
        # ratchet:exclude
        env:
          TITLE:
            '${{ github.event.pull_request.title || github.event.issue.title }}'
          DESCRIPTION:
            '${{ github.event.pull_request.body || github.event.issue.body }}'
          EVENT_NAME: '${{ github.event_name }}'
          GITHUB_TOKEN:
            '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN
            || github.token }}'
          IS_PULL_REQUEST: '${{ !!github.event.pull_request }}'
          ISSUE_NUMBER:
            '${{ github.event.pull_request.number || github.event.issue.number
            }}'
          REPOSITORY: '${{ github.repository }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
        with:
          gcp_location:
            ${{ inputs.gcp_location ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GOOGLE_CLOUD_LOCATION'] }}
          gcp_project_id:
            ${{ inputs.gcp_project_id ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GOOGLE_CLOUD_PROJECT'] }}
          gcp_service_account:
            ${{ inputs.gcp_service_account ||
            fromJSON(env.WORKFLOW_VARS_JSON)['SERVICE_ACCOUNT_EMAIL'] }}
          gcp_workload_identity_provider:
            ${{ inputs.gcp_workload_identity_provider ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GCP_WIF_PROVIDER'] }}
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version:
            ${{ inputs.gemini_cli_version ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GEMINI_CLI_VERSION'] }}
          gemini_debug:
            ${{ fromJSON(inputs.gemini_debug ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GEMINI_DEBUG'] ||
            fromJSON(env.WORKFLOW_VARS_JSON)['ACTIONS_STEP_DEBUG'] || 'false')
            }}
          gemini_model:
            ${{ inputs.gemini_model ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GEMINI_MODEL'] }}
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist:
            ${{ inputs.google_genai_use_gca ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GOOGLE_GENAI_USE_GCA'] }}
          use_vertex_ai:
            ${{ inputs.google_genai_use_vertexai ||
            fromJSON(env.WORKFLOW_VARS_JSON)['GOOGLE_GENAI_USE_VERTEXAI'] }}
          upload_artifacts:
            ${{ inputs.upload_artifacts ||
            fromJSON(env.WORKFLOW_VARS_JSON)['UPLOAD_ARTIFACTS'] }}
          workflow_name: 'gemini-invoke'
