name: Build & Sentry Release

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master, staging]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0

      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Build (with Sentry envs if provided)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_PUBLIC_DSN }}
          PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_PUBLIC_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo "Building with SENTRY_RELEASE=${SENTRY_RELEASE}"
          pnpm build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Sentry release and upload source maps (optional)
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli --version
          sentry-cli releases new "${SENTRY_RELEASE}"
          sentry-cli sourcemaps upload ./dist --rewrite --strip-prefix ./ --strip-common-prefix --release "${SENTRY_RELEASE}"
          sentry-cli releases finalize "${SENTRY_RELEASE}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags:
            ghcr.io/${{ github.repository_owner }}/pixelated:${{ github.sha }}
          provenance: false
