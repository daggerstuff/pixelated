name: "CodeQL"

permissions:
  contents: read
  security-events: write
  actions: read

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]
  schedule:
    # Run every Monday at 2:00 AM UTC
    - cron: "0 2 * * 1"

env:
  NODE_VERSION: 24.13.0
  PYTHON_VERSION: 3.11
  PNPM_VERSION: 10.30.1

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript", "python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml
          queries: >-
            +security-and-quality,security-extended${{
              matrix.language == 'javascript'
                && ',./.github/codeql/custom-queries/fhir,./.github/codeql/custom-queries/ehr'
                || ''
            }}
          ram: 16384

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        if: matrix.language == 'javascript'
        run: corepack enable

      - name: Setup pnpm
        if: matrix.language == 'javascript'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        if: matrix.language == 'javascript'
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        if: matrix.language == 'javascript'
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install JavaScript dependencies
        if: matrix.language == 'javascript'
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Autobuild JavaScript/TypeScript
        if: matrix.language == 'javascript'
        uses: github/codeql-action/autobuild@v4

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ensure uv is available
        if: matrix.language == 'python'
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            python -m pip install --upgrade pip
            python -m pip install uv
          fi

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          find . -name "requirements.txt" -not -path "*/node_modules/*" | head -5 | while read req; do
            uv pip install -r "$req" --system || true
          done

      - name: Autobuild Python
        if: matrix.language == 'python'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: false
          output: sarif-latest

      - name: Upload SARIF results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: /home/runner/work/_temp/codeql_databases/*/results/*.sarif
          retention-days: 30
