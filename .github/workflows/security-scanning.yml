name: Security Scanning

permissions:
  contents: read
  security-events: write

env:
  GHA_LOCAL_RUN: 'false'

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]
  schedule:
    - cron: '0 0 * * *'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install UV (preferred Python installer)
        run: |
          # Install uv for Python tooling
          python3 -m pip install --no-cache-dir uv

      - name: Run Trivy vulnerability scanner
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        id: trivy
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          NODE_OPTIONS: ${{ vars.TRACE_TRIVY_DEPRECATION == 'true' && '--trace-deprecation' || '--no-deprecation' }}
        with:
          cache: 'false'
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          # Keep SARIF aligned with the configured severity gate.
          limit-severities-for-sarif: true
        continue-on-error: true

      - name: Run Checkov infrastructure scan
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        id: checkov_infra
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,terraform_plan,bicep
          output_format: sarif
          output_file_path: checkov-infra-results.sarif
          skip_check: ''
          skip_path: 'clusters,ai/training/defense_mechanisms,ai/helm/pixel-voice'
          log_level: WARNING
          container_user: 0
        continue-on-error: true

      - name: Run Checkov Kubernetes and Helm scan
        if: ${{ env['GHA_LOCAL_RUN'] != 'true' }}
        id: checkov_helm
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ai/helm/pixel-voice
          framework: kubernetes,helm
          output_format: sarif
          output_file_path: checkov-helm-results.sarif
          skip_check: ''
          log_level: WARNING
          container_user: 0
        continue-on-error: true

      - name: Check for Checkov infrastructure SARIF file
        id: checkov_infra_sarif
        run: |
          if [ -s checkov-infra-results.sarif ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for Checkov Helm/Kubernetes SARIF file
        id: checkov_helm_sarif
        run: |
          if [ -s checkov-helm-results.sarif ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for Trivy SARIF file
        id: trivy_sarif
        run: |
          if [ -s trivy-results.sarif ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create diagnostic artifact when Trivy SARIF missing
        if: ${{ steps.trivy_sarif.outputs.found == 'false' }}
        run: |
          echo "Trivy SARIF not produced (vulnerability DB download may have failed)." > trivy-missing.txt || true

      - name: Upload Trivy diagnostic artifact
        if: ${{ steps.trivy_sarif.outputs.found == 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: trivy-diagnostic
          path: trivy-missing.txt

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && steps.trivy_sarif.outputs.found == 'true' }}
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-fs

      - name: Upload Trivy SARIF as artifact
        uses: actions/upload-artifact@v7
        if: ${{ always() && steps.trivy_sarif.outputs.found == 'true' }}
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      - name: Upload Checkov Infrastructure scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && steps.checkov_infra_sarif.outputs.found == 'true' }}
        with:
          sarif_file: 'checkov-infra-results.sarif'
          category: checkov-infra

      - name: Upload Helm/Kubernetes Checkov scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && steps.checkov_helm_sarif.outputs.found == 'true' }}
        with:
          sarif_file: 'checkov-helm-results.sarif'
          category: checkov-helm

      - name: Create diagnostic artifact when Checkov SARIF is missing
        if:
          ${{ steps.checkov_infra_sarif.outputs.found == 'false' ||
          steps.checkov_helm_sarif.outputs.found == 'false' }}
        run: |
          if [ "${{ steps.checkov_infra_sarif.outputs.found }}" != "true" ]; then
            echo "Checkov infrastructure SARIF not produced." > checkov-missing.txt
          fi
          if [ "${{ steps.checkov_helm_sarif.outputs.found }}" != "true" ]; then
            echo "Checkov Helm/Kubernetes SARIF not produced." >> checkov-missing.txt
          fi

      - name: Upload Checkov diagnostic artifact
        if:
          ${{ steps.checkov_infra_sarif.outputs.found == 'false' ||
          steps.checkov_helm_sarif.outputs.found == 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: checkov-diagnostic
          path: checkov-missing.txt

      - name: Upload Checkov SARIF as artifact
        uses: actions/upload-artifact@v7
        if: ${{ always() && steps.checkov_infra_sarif.outputs.found == 'true' }}
        with:
          name: checkov-infra-sarif
          path: checkov-infra-results.sarif

      - name: Upload Helm/Kubernetes Checkov SARIF as artifact
        uses: actions/upload-artifact@v7
        if: ${{ always() && steps.checkov_helm_sarif.outputs.found == 'true' }}
        with:
          name: checkov-helm-sarif
          path: checkov-helm-results.sarif

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize submodules
        run: bash scripts/devops/init-submodules.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install pnpm
        run: |
          pnpm_version="$(node -p "require('./package.json').packageManager.replace('pnpm@', '')")"
          if [ -z "${pnpm_version}" ]; then
            echo "Failed to read pnpm version from package.json (packageManager field missing)." >&2
            exit 1
          fi

          for attempt in 1 2 3; do
            if npm install -g "pnpm@${pnpm_version}"; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "pnpm install failed after 3 attempts." >&2
              exit 1
            fi
            echo "pnpm install failed on attempt ${attempt}. Retrying in 5s..."
            sleep 5
          done

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run security audit
        run: |
          if pnpm audit --help 2>/dev/null | rg -q -- "--prod"; then
            pnpm audit --json --prod --audit-level moderate > audit-results.json || true
          else
            pnpm audit --json --audit-level moderate > audit-results.json || true
          fi
          if [ ! -s audit-results.json ]; then
            echo "pnpm audit returned an empty output." >&2
            exit 1
          fi

      - name: Enforce moderate+ vulnerability threshold
        run: |
          node <<'NODE'
          const fs = require('fs');

          let data = '{}';
          try {
            data = fs.readFileSync('audit-results.json', 'utf8');
          } catch (error) {
            console.error('Could not read audit-results.json:', error.message);
            process.exit(1);
          }

          if (!data.trim()) {
            console.error('pnpm audit output is empty.');
            process.exit(1);
          }

          const parseJsonLine = (line) => {
            try {
              return JSON.parse(line);
            } catch (error) {
              return null;
            }
          };

          let audit;
          try {
            let normalized = [];
            const trimmedData = data.trim();
            try {
              const parsed = JSON.parse(trimmedData);
              normalized = Array.isArray(parsed) ? parsed : [parsed];
            } catch {
              normalized = trimmedData
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean)
                .map(parseJsonLine)
                .filter((entry) => entry && typeof entry === 'object');
            }

            if (!normalized.length) {
              console.error('pnpm audit output did not contain valid JSON records.');
              process.exit(1);
            }

            if (normalized.length === 1) {
              audit = normalized[0];
            } else if (normalized.length > 1) {
              audit = {
                metadata: {},
                vulnerabilities: {},
                advisories: {},
                entries: normalized,
              };
              console.log(`Detected multi-line pnpm audit output with ${normalized.length} JSON records; normalized for compatibility.`);

              const list = normalized.filter(
                (entry) => entry.type === 'auditAdvisory' || entry.type === 'auditStart' || entry.type === 'auditSummary'
              );
              for (const entry of list) {
                if (entry.type === 'auditSummary' && entry.metadata && typeof entry.metadata === 'object') {
                  audit.metadata = entry.metadata;
                }
                if (entry.type === 'auditAdvisory' && entry.data && entry.data.advisory) {
                  const advisory = entry.data.advisory;
                  if (advisory.id != null) {
                    audit.advisories[advisory.id] = advisory;
                  }
                }
              }
            } else {
              audit = {};
            }
          } catch (error) {
            console.error('Failed to parse pnpm audit JSON:', error.message);
            process.exit(1);
          }

          const summary = audit.metadata && (audit.metadata.vulnerabilities || audit.metadata.vulnerableDependencies);
          const advisories = audit.advisories || {};
          const vulnerabilityMap = audit.vulnerabilities || {};
          const hasVulnSummary = Boolean(summary || advisories || vulnerabilityMap);

          if (audit.error || !hasVulnSummary) {
            console.error('pnpm audit did not return a valid vulnerability report:', audit.error || 'unexpected format');
            process.exit(1);
          }

          const counts = (summary && summary.vulnerabilities) || summary || {};
          const advisoryList = Array.isArray(vulnerabilityMap) ? vulnerabilityMap : Object.values(advisories);
          const summaryFromAdvisories = advisoryList.reduce(
            (result, item) => {
              if (!item) return result;
              const severity = (item.severity || '').toLowerCase();
              if (severity === 'low') result.low += 1;
              if (severity === 'moderate') result.moderate += 1;
              if (severity === 'high') result.high += 1;
              if (severity === 'critical') result.critical += 1;
              return result;
            },
            { low: 0, moderate: 0, high: 0, critical: 0 }
          );

          const uniqueAdvisories = new Set(
            Object.values(advisories)
              .map((entry) => entry && entry.id)
              .filter(Boolean)
          ).size;
          const moderate = counts.moderate || 0;
          const high = counts.high || 0;
          const critical = counts.critical || 0;
          const low = counts.low || 0;
          const totalFromMetadata = moderate + high + critical;
          const totalFromAdvisories = Number(summaryFromAdvisories.moderate) + Number(summaryFromAdvisories.high) + Number(summaryFromAdvisories.critical);
          const auditSummary = {
            low: counts.low || summaryFromAdvisories.low,
            moderate: counts.moderate || summaryFromAdvisories.moderate,
            high: counts.high || summaryFromAdvisories.high,
            critical: counts.critical || summaryFromAdvisories.critical,
          };

          console.log('pnpm audit summary:', JSON.stringify(auditSummary, null, 2));
          if (totalFromMetadata > 0 || totalFromAdvisories > 0) {
            console.error(
              `Dependency scan found moderate+ vulnerabilities: moderate=${auditSummary.moderate}, high=${auditSummary.high}, critical=${auditSummary.critical}`
            );
            process.exit(1);
          }

          console.log(`No vulnerabilities at moderate or higher found (dev deps excluded).`);
          console.log(`Low severity count: ${auditSummary.low}`);
          console.log(`Unique advisory definitions analyzed: ${uniqueAdvisories}`);
          NODE

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-results
          path: audit-results.json
