name: '🔎 Gemini Review'
on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false
concurrency:
  group:
    '${{ github.workflow }}-review-${{ github.event_name }}-${{
    github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true
defaults:
  run:
    shell: 'bash'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_CLI_TRUST_WORKSPACE: true

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3'
        # ratchet:actions/create-github-app-token@v3
        with:
          client-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'
      - name: 'Validate Gemini auth configuration'
        id: 'validate_gemini_auth'
        env:
          HAS_GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY != '' }}"
          HAS_GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY != '' }}"
          HAS_GCP_WIF_PROVIDER: "${{ vars.GCP_WIF_PROVIDER != '' }}"
          HAS_GCP_PROJECT: "${{ vars.GOOGLE_CLOUD_PROJECT != '' }}"
          HAS_GCP_SERVICE_ACCOUNT: "${{ vars.SERVICE_ACCOUNT_EMAIL != '' }}"
        run: |-
          set -euo pipefail
          auth_methods=0

          if [ "${HAS_GEMINI_API_KEY}" = 'true' ]; then
            auth_methods=$((auth_methods + 1))
          fi
          if [ "${HAS_GOOGLE_API_KEY}" = 'true' ]; then
            auth_methods=$((auth_methods + 1))
          fi

          if [ "${HAS_GCP_WIF_PROVIDER}" = 'true' ]; then
            if [ "${HAS_GCP_PROJECT}" != 'true' ] || [ "${HAS_GCP_SERVICE_ACCOUNT}" != 'true' ]; then
              echo 'has_gemini_auth=false' >> "${GITHUB_OUTPUT}"
              echo 'auth_validation_error=Gemini WIF configuration is incomplete. Configure vars.GCP_WIF_PROVIDER, vars.GOOGLE_CLOUD_PROJECT, and vars.SERVICE_ACCOUNT_EMAIL together.' >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            auth_methods=$((auth_methods + 1))
          fi

          if [ "${auth_methods}" -eq 0 ]; then
            echo 'has_gemini_auth=false' >> "${GITHUB_OUTPUT}"
            echo 'auth_validation_error=No Gemini authentication configured. Set one of: secrets.GEMINI_API_KEY, secrets.GOOGLE_API_KEY, or vars.GCP_WIF_PROVIDER + vars.GOOGLE_CLOUD_PROJECT + vars.SERVICE_ACCOUNT_EMAIL.' >> "${GITHUB_OUTPUT}"
          elif [ "${auth_methods}" -gt 1 ]; then
            echo 'has_gemini_auth=false' >> "${GITHUB_OUTPUT}"
            echo 'auth_validation_error=Gemini auth is ambiguous. Set exactly one method: GEMINI_API_KEY, GOOGLE_API_KEY, or WIF vars.' >> "${GITHUB_OUTPUT}"
          else
            echo 'has_gemini_auth=true' >> "${GITHUB_OUTPUT}"
            echo 'auth_validation_error=' >> "${GITHUB_OUTPUT}"
          fi
      - name: 'Checkout repository'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd'
        # ratchet:actions/checkout@v6
      - name: 'Run Gemini pull request review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        # ratchet:exclude
        id: 'gemini_pr_review'
        if: |-
          ${{ steps.validate_gemini_auth.outputs.has_gemini_auth == 'true' }}
        env:
          GITHUB_TOKEN:
            '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN
            || github.token }}'
          GEMINI_CLI_TRUST_WORKSPACE: true
          ISSUE_TITLE:
            '${{ github.event.pull_request.title || github.event.issue.title }}'
          ISSUE_BODY:
            '${{ github.event.pull_request.body || github.event.issue.body }}'
          PULL_REQUEST_NUMBER:
            '${{ github.event.pull_request.number || github.event.issue.number
            }}'
          REPOSITORY: '${{ github.repository }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug:
            '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false)
            }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-review'
      - name: 'Abort on auth configuration error'
        if: |-
          ${{ steps.validate_gemini_auth.outputs.has_gemini_auth != 'true' }}
        run: |-
          echo "::error::${{ steps.validate_gemini_auth.outputs.auth_validation_error }}"
          exit 1
