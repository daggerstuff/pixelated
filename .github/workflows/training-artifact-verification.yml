name: Training Artifact Verification

'on':
  workflow_dispatch:
  pull_request:
    paths:
      - ai/pipelines/orchestrator/orchestration/integrated_training_pipeline.py
      - ai/pipelines/orchestrator/scripts/verify_stage_manifest_and_splits.py
      - ai/data/training_policy_manifest.json
      - ai/lightning/training_run_checklist.json
      - ai/training_data_consolidated/final/**
  push:
    branches:
      - main
      - staging
    paths:
      - ai/pipelines/orchestrator/orchestration/integrated_training_pipeline.py
      - ai/pipelines/orchestrator/scripts/verify_stage_manifest_and_splits.py
      - ai/data/training_policy_manifest.json
      - ai/lightning/training_run_checklist.json
      - ai/training_data_consolidated/final/**

jobs:
  verify-stage-artifacts:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Verify stage manifest and split completeness
        run: |
          python ai/pipelines/orchestrator/scripts/verify_stage_manifest_and_splits.py
