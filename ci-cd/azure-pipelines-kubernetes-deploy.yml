name: pixelated-aks-$(Date:yyyyMMdd)-$(Rev:.r)

trigger:
  batch: true
  branches:
    include:
      - main
      - master
      - staging
  paths:
    include:
      - src/**
      - ai/**
      - docker/**
      - scripts/devops/**
      - ci-cd/azure-pipelines-kubernetes-deploy.yml
      - ai/infrastructure/helm/**
      - k8s/**
      - package.json
      - pnpm-lock.yaml
    exclude:
      - docs/**
      - '**/*.md'

pr:
  autoCancel: true
  branches:
    include:
      - main
      - master
      - staging
  paths:
    include:
      - src/**
      - ai/**
      - docker/**
      - scripts/devops/**
      - ci-cd/azure-pipelines-kubernetes-deploy.yml
      - ai/infrastructure/helm/**
      - k8s/**
      - package.json
      - pnpm-lock.yaml
    exclude:
      - docs/**
      - '**/*.md'

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: staging
    values:
      - staging
      - production
  - name: pushLatest
    displayName: 'Push :latest tag'
    type: boolean
    default: false

variables:
  - group: pixelated-pipeline-variables
  - name: ACR_NAME
    value: pixelatedregistry01
  - name: ACR_REPO
    value: pixelatedempathy
  - name: CHART_DIR
    value: ai/infrastructure/helm/pixelated-empathy
  - name: ACR_LOGIN_SERVER
    value: $(ACR_NAME).azurecr.io
  # Runtime variables for branch-based deployment conditions
  - name: isStagingBranch
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/staging')]
  - name: isProductionBranch
    value: $[or(eq(variables['Build.SourceBranch'], 'refs/heads/master'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))]

stages:
  # Stage 1: Build the Docker image once and push to ACR.
  # Runs on a Microsoft-hosted agent so no self-hosted runner availability is required.
  - stage: Build
    displayName: Build and push image to ACR
    jobs:
      - job: BuildImage
        displayName: Build image and push to ACR
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            fetchDepth: 0

          - task: SonarCloudPrepare@4
            displayName: 'Prepare Analysis Configuration'
            inputs:
              SonarCloud: 'SonarQube Cloud'
              organization: 'slimshadyme'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: 'slimshadyme_pixelated'
              cliProjectName: 'pixelated'

          - task: AzureCLI@2
            displayName: Build and push image to ACR
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                bash scripts/devops/azure_aks_preflight.sh

                IMAGE_TAG="${BUILD_SOURCEVERSION:0:7}"
                IMAGE_FULL="$(ACR_LOGIN_SERVER)/$(ACR_REPO):${IMAGE_TAG}"
                IMAGE_LATEST="$(ACR_LOGIN_SERVER)/$(ACR_REPO):latest"

                echo "🔐 Logging into ACR"
                az acr login --name "$(ACR_NAME)"

                echo "📦 Building ${IMAGE_FULL}"
                docker build -f docker/Dockerfile.production -t "${IMAGE_FULL}" .
                docker push "${IMAGE_FULL}"

                if [ "${{ parameters.pushLatest }}" = "True" ] || [ "${{ parameters.pushLatest }}" = "true" ]; then
                  docker tag "${IMAGE_FULL}" "${IMAGE_LATEST}"
                  docker push "${IMAGE_LATEST}"
                fi

                # Export the computed tag for downstream stages
                echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]${IMAGE_TAG}"
            name: build_step
            env:
              APP_ENVIRONMENT: ${{ parameters.environment }}
              PUSH_LATEST: ${{ parameters.pushLatest }}
              ACR_NAME: $(ACR_NAME)
              ACR_REPO: $(ACR_REPO)
              ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)

          - task: SonarCloudAnalyze@4
            displayName: 'Run Code Analysis'

          - task: SonarCloudPublish@4
            displayName: 'Publish Quality Gate Result'
            inputs:
              pollingTimeoutSec: '300'

  # Stage 2: Deploy to AKS from a Microsoft-hosted agent (preferred).
  # Uses the image tag produced in the Build stage.
- stage: DeployHosted
  displayName: Deploy to AKS (hosted agent)
  dependsOn: Build
  ${{ if eq(parameters.environment, 'staging') }}:
    condition: and(succeeded(), eq(variables.isStagingBranch, true))
  ${{ if eq(parameters.environment, 'production') }}:
    condition: and(succeeded(), eq(variables.isProductionBranch, true))
    variables:
      IMAGE_TAG: $[ stageDependencies.Build.BuildImage.outputs['build_step.IMAGE_TAG'] ]
    jobs:
      - job: DeployHosted
        displayName: Helm deploy (hosted)
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            fetchDepth: 1

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: v3.15.4

          - task: AzureCLI@2
            displayName: Deploy Helm chart to AKS
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                export BUILD_SOURCEVERSION="$(IMAGE_TAG)"
                bash scripts/devops/azure_aks_deploy.sh
            env:
              APP_ENVIRONMENT: ${{ parameters.environment }}
              PUSH_LATEST: ${{ parameters.pushLatest }}
              CHART_DIR: $(CHART_DIR)
              ACR_NAME: $(ACR_NAME)
              ACR_REPO: $(ACR_REPO)
              ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
              AKS_CLUSTER_NAME: $(AKS_CLUSTER_NAME)
              AKS_RESOURCE_GROUP: $(AKS_RESOURCE_GROUP)
              SKIP_BUILD: 'true'
