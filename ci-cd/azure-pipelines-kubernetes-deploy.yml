name: pixelated-aks-$(Date:yyyyMMdd)-$(Rev:.r)

trigger:
  batch: true
  branches:
    include:
      - main
      - master
      - staging
  paths:
    include:
      - src/**
      - ai/**
      - docker/**
      - scripts/devops/**
      - ci-cd/azure-pipelines-kubernetes-deploy.yml
      - ai/infrastructure/helm/**
      - k8s/**
      - package.json
      - pnpm-lock.yaml
    exclude:
      - docs/**
      - '**/*.md'

pr:
  autoCancel: true
  branches:
    include:
      - main
      - master
      - staging
  paths:
    include:
      - src/**
      - ai/**
      - docker/**
      - scripts/devops/**
      - ci-cd/azure-pipelines-kubernetes-deploy.yml
      - ai/infrastructure/helm/**
      - k8s/**
      - package.json
      - pnpm-lock.yaml
    exclude:
      - docs/**
      - '**/*.md'

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: staging
    values:
      - staging
      - production
  - name: pushLatest
    displayName: 'Push :latest tag'
    type: boolean
    default: false

variables:
  - group: pixelated-pipeline-variables
  - name: ACR_NAME
    value: pixelatedregistry01
  - name: ACR_REPO
    value: pixelatedempathy
  - name: CHART_DIR
    value: ai/infrastructure/helm/pixelated-empathy
  - name: ACR_LOGIN_SERVER
    value: $(ACR_NAME).azurecr.io

stages:
  # Stage 1: Build the Docker image once and push to ACR.
  # Runs on a Microsoft-hosted agent so no self-hosted runner availability is required.
  - stage: Build
    displayName: Build and push image to ACR
    jobs:
      - job: BuildImage
        displayName: Build image and push to ACR
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            fetchDepth: 0

          - task: SonarCloudPrepare@4
            displayName: 'Prepare Analysis Configuration'
            inputs:
              SonarCloud: 'SonarQube Cloud'
              organization: 'slimshadyme'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: 'slimshadyme_pixelated'
              cliProjectName: 'pixelated'

          - task: AzureCLI@2
            displayName: Build and push image to ACR
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                bash scripts/devops/azure_aks_preflight.sh

                IMAGE_TAG="${BUILD_SOURCEVERSION:0:7}"
                IMAGE_FULL="$(ACR_LOGIN_SERVER)/$(ACR_REPO):${IMAGE_TAG}"
                IMAGE_LATEST="$(ACR_LOGIN_SERVER)/$(ACR_REPO):latest"

                echo "🔐 Logging into ACR"
                az acr login --name "$(ACR_NAME)"

                echo "📦 Building ${IMAGE_FULL}"
                docker build -f docker/Dockerfile.production -t "${IMAGE_FULL}" .
                docker push "${IMAGE_FULL}"

                if [ "${{ parameters.pushLatest }}" = "True" ] || [ "${{ parameters.pushLatest }}" = "true" ]; then
                  docker tag "${IMAGE_FULL}" "${IMAGE_LATEST}"
                  docker push "${IMAGE_LATEST}"
                fi

                # Export the computed tag for downstream stages
                echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]${IMAGE_TAG}"
            name: build_step
            env:
              APP_ENVIRONMENT: ${{ parameters.environment }}
              PUSH_LATEST: ${{ parameters.pushLatest }}
              ACR_NAME: $(ACR_NAME)
              ACR_REPO: $(ACR_REPO)
              ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
              APP_HOSTNAME_STAGING: $(APP_HOSTNAME_STAGING)
              APP_HOSTNAME_PRODUCTION: $(APP_HOSTNAME_PRODUCTION)
              AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
              AKS_CLUSTER_NAME: $(AKS_CLUSTER_NAME)
              AKS_RESOURCE_GROUP: $(AKS_RESOURCE_GROUP)
              AZURE_AKS_CLUSTER_NAME: $(AZURE_AKS_CLUSTER_NAME)
              AZURE_AKS_RESOURCE_GROUP: $(AZURE_AKS_RESOURCE_GROUP)

          - task: SonarCloudAnalyze@4
            displayName: 'Run Code Analysis'

          - script: |
              set -euo pipefail

              SONAR_POLLING_TIMEOUT_SEC="${SONAR_POLLING_TIMEOUT_SEC:-300}"
              SONAR_POLL_INTERVAL_SEC="${SONAR_POLL_INTERVAL_SEC:-5}"
              WORKSPACE_DIR="${BUILD_SOURCESDIRECTORY:-$(pwd)}"

              require_command() {
                local command_name="$1"
                if ! command -v "${command_name}" >/dev/null 2>&1; then
                  echo "##vso[task.logissue type=error]Required command not found: ${command_name}" >&2
                  exit 1
                fi
              }

              require_env() {
                local var_name="$1"
                if [[ -z "${!var_name:-}" ]]; then
                  echo "##vso[task.logissue type=error]Missing required environment variable: ${var_name}" >&2
                  exit 1
                fi
              }

              json_field() {
                local key_path="$1"
                node -e '
                  const fs = require("fs");
                  const keyPath = process.argv[1].split(".");
                  const input = fs.readFileSync(0, "utf8");
                  const data = JSON.parse(input);
                  let value = data;
                  for (const key of keyPath) {
                    if (value == null || !(key in value)) {
                      process.exit(2);
                    }
                    value = value[key];
                  }
                  if (typeof value === "object") {
                    process.stdout.write(JSON.stringify(value));
                  } else {
                    process.stdout.write(String(value));
                  }
                ' "${key_path}"
              }

              read_property() {
                local property_name="$1"
                local file_path="$2"
                sed -n "s/^${property_name}=//p" "${file_path}" | head -n 1
              }

              find_report_task_file() {
                if [[ -n "${SONAR_SCANNER_REPORTTASKFILE:-}" && -f "${SONAR_SCANNER_REPORTTASKFILE}" ]]; then
                  printf '%s\n' "${SONAR_SCANNER_REPORTTASKFILE}"
                  return 0
                fi

                find "${WORKSPACE_DIR}" \
                  \( -path '*/.scannerwork/report-task.txt' -o -path '*/.sonarqube/out/.sonar/report-task.txt' -o -name 'report-task.txt' \) \
                  -type f \
                  | head -n 1
              }

              poll_ce_task() {
                local ce_task_url="$1"
                local attempts=$((SONAR_POLLING_TIMEOUT_SEC / SONAR_POLL_INTERVAL_SEC))
                local response=""
                local status=""
                local analysis_id=""
                local attempt=0

                while (( attempt <= attempts )); do
                  response="$(curl -fsS -u "${SONAR_TOKEN}:" "${ce_task_url}")"
                  status="$(printf '%s' "${response}" | json_field 'task.status')"

                  case "${status}" in
                    SUCCESS)
                      analysis_id="$(printf '%s' "${response}" | json_field 'task.analysisId')"
                      printf '%s\n' "${analysis_id}"
                      return 0
                      ;;
                    PENDING|IN_PROGRESS)
                      sleep "${SONAR_POLL_INTERVAL_SEC}"
                      ;;
                    CANCELED|FAILED)
                      echo "##vso[task.logissue type=error]Sonar CE task failed with status ${status}." >&2
                      exit 1
                      ;;
                    *)
                      echo "##vso[task.logissue type=error]Unexpected Sonar CE task status: ${status}" >&2
                      exit 1
                      ;;
                  esac

                  attempt=$((attempt + 1))
                done

                echo "##vso[task.logissue type=error]Timed out waiting for Sonar analysis completion after ${SONAR_POLLING_TIMEOUT_SEC}s." >&2
                exit 1
              }

              require_command curl
              require_command node
              require_env SONAR_TOKEN

              report_task_file="$(find_report_task_file)"
              if [[ -z "${report_task_file}" || ! -f "${report_task_file}" ]]; then
                echo "##vso[task.logissue type=error]Could not locate Sonar scanner report-task.txt under ${WORKSPACE_DIR}." >&2
                exit 1
              fi

              server_url="$(read_property serverUrl "${report_task_file}")"
              ce_task_url="$(read_property ceTaskUrl "${report_task_file}")"
              ce_task_id="$(read_property ceTaskId "${report_task_file}")"
              project_key="$(read_property projectKey "${report_task_file}")"

              if [[ -z "${ce_task_url}" && -n "${server_url}" && -n "${ce_task_id}" ]]; then
                ce_task_url="${server_url%/}/api/ce/task?id=${ce_task_id}"
              fi

              if [[ -z "${ce_task_url}" ]]; then
                echo "##vso[task.logissue type=error]report-task.txt is missing ceTaskUrl/ceTaskId." >&2
                exit 1
              fi

              echo "Waiting for Sonar analysis to complete for ${project_key:-unknown project}..."
              analysis_id="$(poll_ce_task "${ce_task_url}")"

              quality_gate_url="${server_url%/}/api/qualitygates/project_status?analysisId=${analysis_id}"
              quality_gate_response="$(curl -fsS -u "${SONAR_TOKEN}:" "${quality_gate_url}")"
              quality_gate_status="$(printf '%s' "${quality_gate_response}" | json_field 'projectStatus.status')"

              echo "Quality Gate status: ${quality_gate_status}"
              echo "##vso[task.setvariable variable=SONAR_QUALITY_GATE_STATUS]${quality_gate_status}"

              case "${quality_gate_status}" in
                OK)
                  echo "Quality Gate passed: ${quality_gate_status}"
                  ;;
                WARN|ERROR|NONE)
                  echo "##vso[task.logissue type=error]Quality Gate failed: ${quality_gate_status}" >&2
                  exit 1
                  ;;
                *)
                  echo "##vso[task.logissue type=error]Unexpected Quality Gate status: ${quality_gate_status}" >&2
                  exit 1
                  ;;
              esac
            displayName: 'Publish Quality Gate Result'
            env:
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_POLLING_TIMEOUT_SEC: '300'

  # Stage 2: Deploy to AKS from a Microsoft-hosted agent (preferred).
  # Uses the image tag produced in the Build stage.
  - stage: DeployHosted
    displayName: Deploy to AKS (hosted agent)
    dependsOn: Build
    condition: |
      and(
        succeeded(),
        or(
          and(
            eq('${{ parameters.environment }}', 'staging'),
            eq(variables['Build.SourceBranch'], 'refs/heads/staging')
          ),
          and(
            eq('${{ parameters.environment }}', 'production'),
            or(
              eq(variables['Build.SourceBranch'], 'refs/heads/master'),
              eq(variables['Build.SourceBranch'], 'refs/heads/main')
            )
          )
        )
      )
    variables:
      IMAGE_TAG: $[ stageDependencies.Build.BuildImage.outputs['build_step.IMAGE_TAG'] ]
    jobs:
      - job: DeployHosted
        displayName: Helm deploy (hosted)
        pool:
          vmImage: ubuntu-24.04
        steps:
          - checkout: self
            fetchDepth: 1
            persistCredentials: true

          - script: bash scripts/devops/init-submodules.sh
            displayName: Initialize CI-aware submodules

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: v3.15.4

          - task: AzureCLI@2
            displayName: Deploy Helm chart to AKS
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                export BUILD_SOURCEVERSION="$(IMAGE_TAG)"
                bash scripts/devops/azure_aks_deploy.sh
            env:
              APP_ENVIRONMENT: ${{ parameters.environment }}
              PUSH_LATEST: ${{ parameters.pushLatest }}
              CHART_DIR: $(CHART_DIR)
              ACR_NAME: $(ACR_NAME)
              ACR_REPO: $(ACR_REPO)
              ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
              APP_HOSTNAME_STAGING: $(APP_HOSTNAME_STAGING)
              APP_HOSTNAME_PRODUCTION: $(APP_HOSTNAME_PRODUCTION)
              AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
              AKS_CLUSTER_NAME: $(AKS_CLUSTER_NAME)
              AKS_RESOURCE_GROUP: $(AKS_RESOURCE_GROUP)
              AZURE_AKS_CLUSTER_NAME: $(AZURE_AKS_CLUSTER_NAME)
              AZURE_AKS_RESOURCE_GROUP: $(AZURE_AKS_RESOURCE_GROUP)
              SKIP_BUILD: 'true'
