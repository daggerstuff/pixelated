name: pixelated-aks-$(Date:yyyyMMdd)-$(Rev:.r)

trigger:
  batch: true
  branches:
    include:
      - main
      - master
      - staging
  paths:
    include:
      - src/**
      - ai/**
      - docker/**
      - scripts/devops/**
      - ci-cd/azure-pipelines-kubernetes-deploy.yml
      - ai/infrastructure/helm/**
      - k8s/**
      - package.json
      - pnpm-lock.yaml
      - .gitmodules
    exclude:
      - docs/**
      - '**/*.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: production
    values:
      - staging
      - production
  - name: pushLatest
    displayName: 'Push :latest tag'
    type: boolean
    default: false

variables:
  - group: pixelated-pipeline-variables
  - name: ACR_NAME
    value: pixelatedregistry01
  - name: ACR_REPO
    value: pixelatedempathy
  - name: CHART_DIR
    value: ai/infrastructure/helm/pixelated-empathy
  - name: ACR_LOGIN_SERVER
    value: $(ACR_NAME).azurecr.io

stages:
  # Stage 1: Build the Docker image once and push to ACR.
  - stage: Build
    displayName: Build and push image to ACR
    jobs:
      - job: BuildImage
        displayName: Build image and push to ACR
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true
            submodules: false

          - task: Bash@3
            displayName: 'Preflight: Validate submodule credentials'
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              AZDO_PAT: $(AZDO_PAT)
              AZDO_USERNAME: $(AZDO_USERNAME)
            inputs:
              targetType: 'inline'
              script: |
                set -euo pipefail

                sanitize_token() {
                  local token="${1:-}"

                  case "${token}" in
                    ""|'$('*) printf '' ;;
                    *) printf '%s' "${token}" ;;
                  esac
                }

                SYSTEM_ACCESSTOKEN="$(sanitize_token "${SYSTEM_ACCESSTOKEN:-}")"
                GITHUB_PAT="$(sanitize_token "${GITHUB_PAT:-}")"
                AZDO_PAT="$(sanitize_token "${AZDO_PAT:-}")"

                if [ -z "${SYSTEM_ACCESSTOKEN:-}" ] && [ -z "${AZDO_PAT:-}" ] && [ -z "${GITHUB_PAT:-}" ]; then
                  echo "##vso[task.logissue type=error]None of System.AccessToken, AZDO_PAT, or GITHUB_PAT is set for submodule initialization."
                  exit 1
                fi

                if [ -z "${SYSTEM_ACCESSTOKEN:-}" ] && [ -z "${AZDO_PAT:-}" ]; then
                  echo "##[warning]Neither System.AccessToken nor AZDO_PAT is set. Azure submodule mirrors may not be available."
                elif [ -z "${SYSTEM_ACCESSTOKEN:-}" ] && [ -n "${AZDO_PAT:-}" ]; then
                  echo "✅ AZDO_PAT is present for Azure mirror fallback access"
                fi

                if [ -z "${GITHUB_PAT:-}" ]; then
                  echo "##[warning]GITHUB_PAT is not set. GitHub submodule fallback will not be available."
                else
                  echo "✅ GITHUB_PAT is present for fallback access"
                fi

                echo "✅ Submodule credential preflight complete"

          - task: Bash@3
            displayName: 'Initialize CI-aware submodules'
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              AZDO_PAT: $(AZDO_PAT)
              AZDO_USERNAME: git
            inputs:
              targetType: 'inline'
              script: |
                set -euo pipefail
                echo "=== Debug: Environment Variables ==="
                echo "AZDO_USERNAME is set to: ${AZDO_USERNAME:-'NOT SET'}"
                echo "SYSTEM_ACCESSTOKEN exists: $(if [ -n "${SYSTEM_ACCESSTOKEN:-}" ]; then echo 'YES (length:' ${#SYSTEM_ACCESSTOKEN} ')'; else echo 'NO'; fi)"
                echo "AZDO_PAT exists: $(if [ -n "${AZDO_PAT:-}" ]; then echo 'YES (length:' ${#AZDO_PAT} ')'; else echo 'NO'; fi)"
                echo "GITHUB_PAT exists: $(if [ -n "${GITHUB_PAT:-}" ]; then echo 'YES (length:' ${#GITHUB_PAT} ')'; else echo 'NO'; fi)"
                echo "Current directory: $(pwd)"
                echo "Git remote -v:"
                git remote -v || true
                echo "==================================="
                bash scripts/devops/init-submodules.sh

          - task: NodeTool@0
            displayName: 'Install Node.js (LTS)'
            inputs:
              versionSpec: '24.x'
              checkLatest: true

          - task: SonarCloudPrepare@4
            displayName: 'Prepare Analysis Configuration'
            inputs:
              SonarCloud: 'SonarQube Cloud'
              organization: 'slimshadyme'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: 'slimshadyme_pixelated'
              cliProjectName: 'pixelated'

          - task: AzureCLI@2
            displayName: Build and push image to ACR
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail

                bash scripts/devops/azure_aks_preflight.sh

                IMAGE_TAG="${BUILD_SOURCEVERSION:0:7}"
                IMAGE_FULL="$(ACR_LOGIN_SERVER)/$(ACR_REPO):${IMAGE_TAG}"
                IMAGE_LATEST="$(ACR_LOGIN_SERVER)/$(ACR_REPO):latest"

                echo "🔐 Logging into ACR"
                az acr login --name "$(ACR_NAME)"

                echo "📦 Building ${IMAGE_FULL}"
                docker build -f docker/Dockerfile.production -t "${IMAGE_FULL}" .
                docker push "${IMAGE_FULL}"

                if [ "${{ parameters.pushLatest }}" = "True" ] || [ "${{ parameters.pushLatest }}" = "true" ]; then
                  docker tag "${IMAGE_FULL}" "${IMAGE_LATEST}"
                  docker push "${IMAGE_LATEST}"
                fi

                # Export the computed tag for downstream stages
                echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]${IMAGE_TAG}"
            name: build_step
            env:
              APP_ENVIRONMENT: ${{ parameters.environment }}
              PUSH_LATEST: ${{ parameters.pushLatest }}
              ACR_NAME: $(ACR_NAME)
              ACR_REPO: $(ACR_REPO)
              ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
              APP_HOSTNAME_STAGING: $(APP_HOSTNAME_STAGING)
              APP_HOSTNAME_PRODUCTION: $(APP_HOSTNAME_PRODUCTION)
              AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
              AKS_CLUSTER_NAME: $(AKS_CLUSTER_NAME)
              AKS_RESOURCE_GROUP: $(AKS_RESOURCE_GROUP)
              AZURE_AKS_CLUSTER_NAME: $(AZURE_AKS_CLUSTER_NAME)
              AZURE_AKS_RESOURCE_GROUP: $(AZURE_AKS_RESOURCE_GROUP)

          - task: SonarCloudAnalyze@4
            displayName: 'Run Code Analysis'

          - task: SonarCloudPublish@4
            displayName: 'Publish Quality Gate Result'
            inputs:
              pollingTimeoutSec: '300'

  # Stage 2: Deploy to AKS
  - stage: DeployHosted
    displayName: Deploy to AKS (self-hosted agent)
    dependsOn: Build
    condition: |
      and(
        succeeded('Build'),
        or(
          and(
            eq('${{ parameters.environment }}', 'staging'),
            eq(variables['Build.SourceBranch'], 'refs/heads/staging')
          ),
          and(
            eq('${{ parameters.environment }}', 'production'),
            or(
              eq(variables['Build.SourceBranch'], 'refs/heads/staging'),
              eq(variables['Build.SourceBranch'], 'refs/heads/master'),
              eq(variables['Build.SourceBranch'], 'refs/heads/main')
            )
          )
        )
      )
    variables:
      - group: pixelated-pipeline-variables
      - name: IMAGE_TAG
        value: $[ stageDependencies.Build.BuildImage.outputs['build_step.IMAGE_TAG'] ]
    jobs:
      - job: DeployHosted
        displayName: Helm deploy (self-hosted)
        steps:
          - checkout: self
            fetchDepth: 1
            persistCredentials: true
            submodules: false

          - task: Bash@3
            displayName: 'Preflight: Validate submodule credentials'
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              AZDO_PAT: $(AZDO_PAT)
              AZDO_USERNAME: $(AZDO_USERNAME)
            inputs:
              targetType: 'inline'
              script: |
                set -euo pipefail

                sanitize_token() {
                  local token="${1:-}"

                  case "${token}" in
                    ""|'$('*) printf '' ;;
                    *) printf '%s' "${token}" ;;
                  esac
                }

                SYSTEM_ACCESSTOKEN="$(sanitize_token "${SYSTEM_ACCESSTOKEN:-}")"
                GITHUB_PAT="$(sanitize_token "${GITHUB_PAT:-}")"
                AZDO_PAT="$(sanitize_token "${AZDO_PAT:-}")"

                if [ -z "${SYSTEM_ACCESSTOKEN:-}" ] && [ -z "${AZDO_PAT:-}" ] && [ -z "${GITHUB_PAT:-}" ]; then
                  echo "##vso[task.logissue type=error]None of System.AccessToken, AZDO_PAT, or GITHUB_PAT is set for submodule initialization."
                  exit 1
                fi

                if [ -z "${SYSTEM_ACCESSTOKEN:-}" ] && [ -z "${AZDO_PAT:-}" ]; then
                  echo "##[warning]Neither System.AccessToken nor AZDO_PAT is set. Azure submodule mirrors may not be available."
                elif [ -z "${SYSTEM_ACCESSTOKEN:-}" ] && [ -n "${AZDO_PAT:-}" ]; then
                  echo "✅ AZDO_PAT is present for Azure mirror fallback access"
                fi

                if [ -z "${GITHUB_PAT:-}" ]; then
                  echo "##[warning]GITHUB_PAT is not set. GitHub submodule fallback will not be available."
                else
                  echo "✅ GITHUB_PAT is present for fallback access"
                fi

                echo "✅ Submodule credential preflight complete"

          - task: Bash@3
            displayName: Ensure unzip is available
            inputs:
              targetType: 'inline'
              script: |
                set -euo pipefail

                if command -v unzip >/dev/null 2>&1; then
                  echo "unzip already installed"
                  exit 0
                fi

                SUDO=""
                if command -v sudo >/dev/null 2>&1; then
                  SUDO="sudo"
                fi

                if command -v apt-get >/dev/null 2>&1; then
                  $SUDO apt-get update
                  $SUDO apt-get install -y unzip
                elif command -v dnf >/dev/null 2>&1; then
                  $SUDO dnf install -y unzip
                elif command -v yum >/dev/null 2>&1; then
                  $SUDO yum install -y unzip
                elif command -v apk >/dev/null 2>&1; then
                  $SUDO apk add --no-cache unzip
                else
                  echo "##vso[task.logissue type=error]Unable to install unzip automatically on this self-hosted agent."
                  exit 1
                fi

          - task: Bash@3
            displayName: 'Initialize CI-aware submodules'
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              AZDO_PAT: $(AZDO_PAT)
              AZDO_USERNAME: git
            inputs:
              targetType: 'inline'
              script: |
                set -euo pipefail
                echo "=== Debug: Environment Variables ==="
                echo "AZDO_USERNAME is set to: ${AZDO_USERNAME:-'NOT SET'}"
                echo "SYSTEM_ACCESSTOKEN exists: $(if [ -n "${SYSTEM_ACCESSTOKEN:-}" ]; then echo 'YES (length:' ${#SYSTEM_ACCESSTOKEN} ')'; else echo 'NO'; fi)"
                echo "AZDO_PAT exists: $(if [ -n "${AZDO_PAT:-}" ]; then echo 'YES (length:' ${#AZDO_PAT} ')'; else echo 'NO'; fi)"
                echo "GITHUB_PAT exists: $(if [ -n "${GITHUB_PAT:-}" ]; then echo 'YES (length:' ${#GITHUB_PAT} ')'; else echo 'NO'; fi)"
                echo "Current directory: $(pwd)"
                echo "Git remote -v:"
                git remote -v || true
                echo "==================================="
                bash scripts/devops/init-submodules.sh

          - task: HelmInstaller@1
            displayName: Install Helm
            inputs:
              helmVersionToInstall: v3.15.4

          - task: KubectlInstaller@0
            displayName: Install kubectl
            inputs:
              kubectlVersion: 'latest'

          - task: AzureCLI@2
            displayName: Deploy Helm chart to AKS
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)
              inlineScript: |
                set -euo pipefail
                bash scripts/devops/azure_aks_preflight.sh
                export BUILD_SOURCEVERSION="$(IMAGE_TAG)"
                bash scripts/devops/azure_aks_deploy.sh
            env:
              APP_ENVIRONMENT: ${{ parameters.environment }}
              PUSH_LATEST: ${{ parameters.pushLatest }}
              CHART_DIR: $(CHART_DIR)
              ACR_NAME: $(ACR_NAME)
              ACR_REPO: $(ACR_REPO)
              ACR_LOGIN_SERVER: $(ACR_LOGIN_SERVER)
              APP_HOSTNAME_STAGING: $(APP_HOSTNAME_STAGING)
              APP_HOSTNAME_PRODUCTION: $(APP_HOSTNAME_PRODUCTION)
              AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
              AKS_CLUSTER_NAME: $(AKS_CLUSTER_NAME)
              AKS_RESOURCE_GROUP: $(AKS_RESOURCE_GROUP)
              AZURE_AKS_CLUSTER_NAME: $(AZURE_AKS_CLUSTER_NAME)
              AZURE_AKS_RESOURCE_GROUP: $(AZURE_AKS_RESOURCE_GROUP)
              SKIP_BUILD: 'true'
