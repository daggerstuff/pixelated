# Reusable deployment steps template
# Used by both standard Deploy and EmergencyDeploy stages

parameters:
- name: environment
  type: string
  default: 'staging'
- name: imageTag
  type: string
  default: 'latest'

steps:
- checkout: self

- task: KubernetesManifest@0
  name: bakeManifests
  displayName: 'Bake Kubernetes Manifests'
  inputs:
    action: 'bake'
    renderType: 'helm2'
    helmChart: './k8s/helm/pixelated'
    releaseName: 'pixelated-${{ parameters.environment }}'
    overrideFiles: |
      ./k8s/helm/pixelated/values-${{ parameters.environment }}.yaml
    overrides: |
      image.repository=$(containerRegistry)/$(imageRepository)
      image.tag=${{ parameters.imageTag }}
      imagePullSecrets[0].name=acr-pull-secret

- task: KubernetesManifest@0
  displayName: 'Deploy to Kubernetes'
  inputs:
    action: 'deploy'
    manifests: |
      $(bakeManifests.manifestsBundle)
    containers: |
      $(containerRegistry)/$(imageRepository):${{ parameters.imageTag }}
    namespace: $(kubernetesNamespace)

- task: Bash@3
  displayName: 'Wait for Deployment Rollout'
  inputs:
    targetType: 'inline'
    script: |
      set -euo pipefail

      echo "⏳ Waiting for deployment rollout..."

      kubectl rollout status deployment/pixelated \
        -n $(kubernetesNamespace) \
        --timeout=300s

      echo "✅ Deployment successful"

- task: Bash@3
  displayName: 'Verify Application Health'
  inputs:
    targetType: 'inline'
    script: |
      set -euo pipefail

      echo "🔍 Verifying application health..."

      # Check pods are running
      READY_PODS=$(kubectl get pods -n $(kubernetesNamespace) \
        -l app=pixelated \
        -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | \
        tr ' ' '\n' | grep -c "True" || echo 0)

      if [ "$READY_PODS" -lt 1 ]; then
        echo "##vso[task.logissue type=error]No ready pods found"
        kubectl get pods -n $(kubernetesNamespace) -l app=pixelated
        exit 1
      fi

      echo "✅ ${READY_PODS} pods ready"

      # Check service endpoint
      SERVICE_IP=$(kubectl get service pixelated \
        -n $(kubernetesNamespace) \
        -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "")

      if [ -n "$SERVICE_IP" ]; then
        echo "Service IP: ${SERVICE_IP}"

        # Health check
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          "http://${SERVICE_IP}/health" || echo "000")

        if [ "$HTTP_STATUS" != "200" ]; then
          echo "⚠️ Health check returned: ${HTTP_STATUS}"
          echo "This may be expected for a new deployment"
        else
          echo "✅ Health check passed"
        fi
      fi
