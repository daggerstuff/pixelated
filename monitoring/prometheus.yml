global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'pixelated-app'
    static_configs:
      - targets: ['pixelated-app:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'ai-service'
    static_configs:
      - targets: ['pixelated-ai:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['pixelated-empathy-postgres-exporter:9187']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['pixelated-empathy-node-exporter:9100']

  - job_name: 'caddy'
    static_configs:
      - targets: ['pixelated-caddy:2019']
    metrics_path: '/metrics'
