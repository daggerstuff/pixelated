# Staging environment values for AKS deployment
environment: "staging"

# Keep training disabled in AKS staging environments unless explicitly enabled.
training:
  enabled: false

postgresql:
  enabled: true
  image:
    repository: bitnami/postgresql
    tag: "latest"
    pullPolicy: IfNotPresent

redis:
  enabled: true
  image:
    repository: bitnami/redis
    tag: "latest"
    pullPolicy: IfNotPresent
