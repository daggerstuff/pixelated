{{- if and .Values.training.enabled .Values.training.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pixelated-empathy.fullname" . }}-training
  labels:
    {{- include "pixelated-empathy.labels" . | nindent 4 }}
    component: training
  {{- with .Values.training.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
---
{{- if .Values.training.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pixelated-empathy.fullname" . }}-training
  labels:
    {{- include "pixelated-empathy.labels" . | nindent 4 }}
    component: training
rules:
  {{- toYaml .Values.training.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pixelated-empathy.fullname" . }}-training
  labels:
    {{- include "pixelated-empathy.labels" . | nindent 4 }}
    component: training
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pixelated-empathy.fullname" . }}-training
subjects:
  - kind: ServiceAccount
    name: {{ include "pixelated-empathy.fullname" . }}-training
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
