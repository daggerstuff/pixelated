sonar.projectKey=slimshadyme_pixelated
sonar.organization=slimshadyme
sonar.sourceEncoding=UTF-8

# Keep analysis focused on the production repo rather than every generated,
# vendored, or nested workspace file in the checkout.
sonar.sources=src,ai,scripts,config,ci-cd,docker,k8s

# The JS/TS analyzer runs in an embedded Node process. Without a higher heap
# and tighter source scope, this repo can overwhelm the bridge and crash the
# WebSocket session in CI.
sonar.javascript.node.maxspace=4096
sonar.typescript.tsconfigPaths=tsconfig.json,config/tsconfig.json

sonar.exclusions=\
**/node_modules/**,\
**/.pnpm/**,\
**/.git/**,\
**/.astro/**,\
**/.scannerwork/**,\
**/.venv/**,\
**/.cursor/**,\
**/.claude/**,\
**/.agent/**,\
**/.notes/**,\
**/.planning/**,\
**/dist/**,\
**/coverage/**,\
**/public/**,\
**/docs/**,\
**/business-strategy-cms/**,\
**/worktrees/**,\
**/*.min.js,\
**/*.bundle.js

sonar.test.exclusions=\
**/tests/**,\
**/__tests__/**,\
**/*.test.*,\
**/*.spec.*


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=pixelated
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
