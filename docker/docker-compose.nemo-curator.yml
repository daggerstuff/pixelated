# NVIDIA NeMo Curator for Data Refinement
# Part of Priority #1

services:
  nemo-curator:
    image: ${NEMO_CURATOR_IMAGE:-nvcr.io/nvidia/nemo-curator:25.09}
    container_name: nemo-curator
    entrypoint: /bin/bash
    tty: true
    volumes:
      - ./ai/datasets:/workspace/datasets
      - ./ai/pipelines/orchestrator/processing:/workspace/scripts
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    networks:
      - nemo-network

networks:
  nemo-network:
    external: true
