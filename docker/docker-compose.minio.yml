# MinIO (AIStor Server) Configuration
# Based on: https://docs.min.io/enterprise/aistor-server/reference/aistor-server/settings/#file-based-environment-variables
#
# Usage:
#   docker compose -f docker/docker-compose.minio.yml up -d
#   docker compose -f docker/docker-compose.minio.yml down
#
# Access:
#   - API: http://localhost:9000
#   - Console: http://localhost:9001

services:
  minio:
    image: quay.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: pixelated-minio
    restart: unless-stopped

    command: server /data --console-address ":9001" --address ":9000"

    # Root credentials (required - must be set via environment variables)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: us-east-1

    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console

    volumes:
      - minio_data:/data

    networks:
      - minio-network

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

    labels:
      - "com.pixelated.service=minio"
      - "com.pixelated.description=Object Storage"


volumes:
  minio_data:
    driver: local

networks:
  minio-network:
    driver: bridge
    name: pixelated-minio-network
