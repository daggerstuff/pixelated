apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pixelated-empathy-staging
  namespace: pixelated-empathy-staging
  annotations:
    kubernetes.io/ingress.class: caddy
    caddy.ingress.kubernetes.io/disable-http-redirect: "true"
    # Trust Cloudflare proxy to handle X-Forwarded-* headers correctly
    caddy.ingress.kubernetes.io/trusted-proxies: "cloudflare"
spec:
  rules:
  - host: pixelatedempathy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pixelated-empathy-staging
            # Ensure this matches the actual service port (from values.yaml)
            port:
              number: 8000
